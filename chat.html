<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Family Connect Pro</title>

    <link rel="manifest" href="manifest-chat.json" />
    <meta name="theme-color" content="#075e54" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏠</text></svg>"
    />

    <style>
      :root {
        --wa-green: #075e54;
        --light-green: #dcf8c6;
        --blue-tick: #34b7f1;
        --bg-gray: #e5ddd5;
      }
      body {
        font-family: "Segoe UI", sans-serif;
        margin: 0;
        background: var(--bg-gray);
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
      }

      #login-screen,
      #lobby-screen {
        position: fixed;
        inset: 0;
        background: #f0f2f5;
        z-index: 100;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .card {
        background: white;
        padding: 25px;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        width: 90%;
        max-width: 350px;
        text-align: center;
      }

      input {
        width: 90%;
        padding: 12px;
        margin: 15px 0;
        border: 1px solid #ddd;
        border-radius: 10px;
        font-size: 16px;
        outline: none;
      }
      button {
        width: 100%;
        padding: 12px;
        margin: 8px 0;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-weight: bold;
        font-size: 15px;
      }
      .btn-primary {
        background: var(--wa-green);
        color: white;
      }

      .contact-row {
        background: white;
        border-bottom: 1px solid #eee;
        padding: 18px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        cursor: pointer;
        font-weight: 600;
      }
      .badge {
        background: #25d366;
        color: white;
        border-radius: 50%;
        min-width: 22px;
        height: 22px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
      }

      #chat-interface {
        display: none;
        flex-direction: column;
        height: 100vh;
        width: 100%;
        position: absolute;
        top: 0;
        left: 0;
        z-index: 50;
        background: var(--bg-gray);
      }
      #chat-header {
        background: var(--wa-green);
        color: white;
        padding: 12px 15px;
        display: flex;
        align-items: center;
        gap: 15px;
      }
      #chat-box {
        flex: 1;
        overflow-y: auto;
        padding: 15px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        background-image: url("https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png");
      }

      .msg {
        padding: 10px 14px;
        border-radius: 14px;
        max-width: 75%;
        font-size: 15px;
        box-shadow: 0 1px 1px rgba(0, 0, 0, 0.1);
        position: relative;
        word-wrap: break-word;
        user-select: none;
        -webkit-user-select: none;
      }
      .me {
        align-self: flex-end;
        background: var(--light-green);
        border-top-right-radius: 2px;
      }
      .them {
        align-self: flex-start;
        background: white;
        border-top-left-radius: 2px;
      }

      .meta {
        font-size: 10px;
        text-align: right;
        opacity: 0.6;
        margin-top: 5px;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 4px;
      }
      #input-area {
        background: #f0f0f0;
        padding: 10px;
        display: flex;
        gap: 10px;
      }
      #msgInput {
        flex: 1;
        margin: 0;
      }
      #sendBtn {
        width: 45px;
        height: 45px;
        border-radius: 50%;
        background: var(--wa-green);
        color: white;
        border: none;
        font-size: 22px;
      }
    </style>
  </head>
  <body>
    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("sw.js");
      }
    </script>

    <div id="login-screen">
      <div class="card">
        <h2 style="color: var(--wa-green); margin: 0">Family Connect</h2>
        <input type="password" id="idInput" placeholder="Enter Secret ID" />
        <button class="btn-primary" onclick="checkLogin()">Enter House</button>
        <div style="font-size: 10px; color: #ccc; margin-top: 10px">
          F10, M20, A30, S40
        </div>
      </div>
    </div>

    <div id="lobby-screen" style="display: none">
      <div
        class="card"
        style="max-width: 450px; width: 95%; padding: 0; overflow: hidden"
      >
        <div
          style="
            background: var(--wa-green);
            color: white;
            padding: 20px;
            text-align: left;
          "
        >
          <h3 style="margin: 0">Family Messages</h3>
        </div>
        <div id="group-btn-container"></div>
        <div
          id="contact-list"
          style="max-height: 400px; overflow-y: auto"
        ></div>
      </div>
    </div>

    <div id="chat-interface">
      <div id="chat-header">
        <button
          onclick="backToLobby()"
          style="
            width: auto;
            background: none;
            font-size: 24px;
            color: white;
            border: none;
          "
        >
          ←
        </button>
        <div>
          <div id="chat-title" style="font-weight: bold; font-size: 18px">
            Chat
          </div>
          <div style="font-size: 11px; opacity: 0.8">
            12h Auto-Vanish Active
          </div>
        </div>
      </div>
      <div id="chat-box"></div>
      <div id="input-area">
        <input type="text" id="msgInput" placeholder="Type a message..." />
        <button id="sendBtn" onclick="sendMsg()">➤</button>
      </div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import {
        getDatabase,
        ref,
        push,
        onValue,
        query,
        limitToLast,
        update,
        remove,
        off,
      } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

      const firebaseConfig = {
        apiKey: "AIzaSyAV3pyiwrB0Cf4e4RxLyATu-i9qnWzX1kY",
        databaseURL:
          "https://sibling-help-app-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "sibling-help-app",
      };

      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);

      const users = {
        F10: "Father",
        M20: "Mother",
        A30: "Akash",
        S40: "Aishwarya",
      };
      let myName = "",
        currentRoom = "",
        chatListener = null;

      window.checkLogin = () => {
        const id = document.getElementById("idInput").value.toUpperCase();
        if (users[id]) {
          myName = users[id];
          document.getElementById("login-screen").style.display = "none";
          document.getElementById("lobby-screen").style.display = "flex";
          renderLobby();
        } else {
          alert("ID not recognized.");
        }
      };

      function renderLobby() {
        const list = document.getElementById("contact-list");
        const groupContainer = document.getElementById("group-btn-container");
        list.innerHTML = "";
        groupContainer.innerHTML = "";

        createContactRow(groupContainer, "Family_Group", "🏠 Family Group");
        Object.values(users).forEach((u) => {
          if (u !== myName) {
            const room = [myName, u].sort().join("_");
            createContactRow(list, room, u);
          }
        });
      }

      function createContactRow(container, room, title) {
        const div = document.createElement("div");
        div.className = "contact-row";
        div.innerHTML = `<span>${title}</span><span id="badge-${room}" class="badge" style="display:none">0</span>`;
        div.onclick = () => startChat(room, title);
        container.appendChild(div);

        onValue(ref(db, `chats/${room}`), (snap) => {
          const data = snap.val();
          let unread = 0;
          if (data)
            Object.values(data).forEach((m) => {
              if (m.sender !== myName && m.seen === false) unread++;
            });
          const badge = document.getElementById(`badge-${room}`);
          if (unread > 0) {
            badge.innerText = unread;
            badge.style.display = "flex";
          } else {
            badge.style.display = "none";
          }
        });
      }

      window.startChat = (room, title) => {
        currentRoom = room;
        document.getElementById("chat-title").innerText = title;
        document.getElementById("lobby-screen").style.display = "none";
        document.getElementById("chat-interface").style.display = "flex";
        listenForMessages();
      };

      window.backToLobby = () => {
        if (chatListener) off(ref(db, `chats/${currentRoom}`));
        document.getElementById("chat-interface").style.display = "none";
        document.getElementById("lobby-screen").style.display = "flex";
      };

      window.sendMsg = () => {
        const text = document.getElementById("msgInput").value.trim();
        if (!text) return;
        push(ref(db, `chats/${currentRoom}`), {
          sender: myName,
          text: text,
          time: new Date().toLocaleTimeString([], {
            hour: "2-digit",
            minute: "2-digit",
          }),
          timestamp: Date.now(),
          seen: false,
        });
        document.getElementById("msgInput").value = "";
        if (navigator.vibrate) navigator.vibrate(40);
      };

      function listenForMessages() {
        const chatBox = document.getElementById("chat-box");
        const twelveHours = 12 * 60 * 60 * 1000;
        const now = Date.now();

        chatListener = onValue(
          query(ref(db, `chats/${currentRoom}`), limitToLast(50)),
          (snap) => {
            chatBox.innerHTML = "";
            const data = snap.val();
            if (data) {
              Object.keys(data).forEach((key) => {
                const m = data[key];

                if (m.timestamp && now - m.timestamp > twelveHours) {
                  remove(ref(db, `chats/${currentRoom}/${key}`));
                  return;
                }

                if (m.sender !== myName && !m.seen)
                  update(ref(db, `chats/${currentRoom}/${key}`), {
                    seen: true,
                  });

                const div = document.createElement("div");
                div.className = `msg ${m.sender === myName ? "me" : "them"}`;

                if (m.sender === myName) {
                  div.oncontextmenu = (e) => {
                    e.preventDefault();
                    if (confirm("Delete for everyone?"))
                      remove(ref(db, `chats/${currentRoom}/${key}`));
                  };
                }

                let ticks =
                  m.sender === myName
                    ? m.seen
                      ? '<span style="color:var(--blue-tick)">✓✓</span>'
                      : "<span>✓</span>"
                    : "";
                div.innerHTML = `<b style="font-size:10px; color:${getSenderColor(m.sender)}">${m.sender}</b><br>${m.text}<div class="meta">${m.time} ${ticks}</div>`;
                chatBox.appendChild(div);
              });
              chatBox.scrollTop = chatBox.scrollHeight;
            }
          },
        );
      }

      function getSenderColor(name) {
        const colors = {
          Father: "#3498db",
          Mother: "#e74c3c",
          Akash: "#9b59b6",
          Aishwarya: "#f39c12",
        };
        return colors[name] || "#333";
      }

      document.getElementById("msgInput").addEventListener("keypress", (e) => {
        if (e.key === "Enter") sendMsg();
      });
    </script>
  </body>
</html>
