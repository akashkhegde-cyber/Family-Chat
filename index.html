<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Family Connect</title>
    <link rel="icon" type="image/png" href="chat-icon.png" />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#075e54" />
    <style>
      :root {
        --wa-green: #075e54;
        --light-green: #dcf8c6;
        --bg-gray: #e5ddd5;
        --blue-tick: #34b7f1;
      }
      body {
        font-family: "Segoe UI", sans-serif;
        margin: 0;
        background: var(--bg-gray);
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* Status & UI */
      .status-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        display: inline-block;
        margin-right: 8px;
      }
      .online {
        background: #25d366;
      }
      .offline {
        background: #bbb;
      }

      #login-screen,
      #lobby-screen {
        position: fixed;
        inset: 0;
        background: #f0f2f5;
        z-index: 100;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      .card {
        background: white;
        padding: 25px;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        width: 90%;
        max-width: 380px;
        text-align: center;
      }

      .contact-row {
        background: white;
        border-bottom: 1px solid #eee;
        padding: 18px;
        display: flex;
        align-items: center;
        cursor: pointer;
        text-align: left;
      }
      .contact-info {
        flex: 1;
        font-weight: 600;
      }

      /* Chat Interface */
      #chat-interface {
        display: none;
        flex-direction: column;
        height: 100vh;
        background: var(--bg-gray);
        z-index: 50;
      }
      #chat-header {
        background: var(--wa-green);
        color: white;
        padding: 12px 15px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      #chat-box {
        flex: 1;
        overflow-y: auto;
        padding: 15px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        background-image: url("https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png");
      }

      /* Typing Indicator Styling */
      #typing-indicator {
        font-size: 12px;
        color: #dcf8c6;
        font-style: italic;
        display: none;
        margin-top: 2px;
      }

      /* Bubbles & Ticks */
      .msg {
        padding: 10px;
        border-radius: 12px;
        max-width: 75%;
        font-size: 15px;
        position: relative;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
      }
      .me {
        align-self: flex-end;
        background: var(--light-green);
        border-top-right-radius: 2px;
      }
      .them {
        align-self: flex-start;
        background: white;
        border-top-left-radius: 2px;
      }

      .msg-meta {
        font-size: 10px;
        opacity: 0.6;
        text-align: right;
        margin-top: 4px;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 3px;
      }
      .tick-blue {
        color: var(--blue-tick);
        font-weight: bold;
      }

      #input-area {
        background: #f0f0f0;
        padding: 10px;
        display: flex;
        gap: 8px;
        align-items: center;
      }
      #msgInput {
        flex: 1;
        padding: 12px;
        border-radius: 25px;
        border: 1px solid #ddd;
        outline: none;
      }
      .btn-round {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        border: none;
        cursor: pointer;
      }
      .logout-btn {
        color: #ff4b2b;
        font-size: 13px;
        cursor: pointer;
        margin-top: 20px;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div id="login-screen">
      <div class="card">
        <img
          src="chat-icon.png"
          width="70"
          style="border-radius: 15px; margin-bottom: 10px"
          onerror="
            this.src = 'https://cdn-icons-png.flaticon.com/512/25/25694.png'
          "
        />
        <h2 style="color: var(--wa-green)">Family Connect</h2>
        <input
          type="password"
          id="idInput"
          placeholder="Enter Secret ID"
          style="
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid #ddd;
          "
        />
        <button
          id="loginBtn"
          style="
            width: 100%;
            padding: 12px;
            background: var(--wa-green);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
          "
        >
          ENTER
        </button>
      </div>
    </div>

    <div id="lobby-screen" style="display: none">
      <div
        class="card"
        style="padding: 0; overflow: hidden; width: 95%; max-height: 85vh"
      >
        <div
          style="
            background: var(--wa-green);
            color: white;
            padding: 15px;
            text-align: left;
            display: flex;
            justify-content: space-between;
          "
        >
          <h3 style="margin: 0">Family Hub</h3>
          <span id="userNameDisp" style="font-size: 12px; opacity: 0.8"></span>
        </div>
        <div id="contact-list" style="overflow-y: auto"></div>
        <div class="logout-btn" onclick="logout()">LOGOUT DEVICE</div>
        <div style="height: 15px"></div>
      </div>
    </div>

    <div id="chat-interface">
      <div id="chat-header">
        <div style="display: flex; align-items: center; gap: 10px">
          <button
            onclick="backToLobby()"
            style="
              background: none;
              border: none;
              color: white;
              font-size: 24px;
            "
          >
            ←
          </button>
          <div>
            <div id="chat-title" style="font-weight: bold">Chat</div>
            <div id="typing-indicator">typing...</div>
          </div>
        </div>
        <button
          id="clear-btn"
          style="background: none; border: none; color: white; font-size: 18px"
          onclick="handleClear()"
        >
          🧹
        </button>
      </div>
      <div id="chat-box"></div>
      <div id="input-area">
        <label style="font-size: 22px; cursor: pointer"
          >📎<input
            type="file"
            accept="image/*"
            style="display: none"
            onchange="uploadFile(this)"
        /></label>
        <input
          type="text"
          id="msgInput"
          placeholder="Message..."
          oninput="updateTypingStatus()"
        />
        <button
          id="sendBtn"
          class="btn-round"
          style="background: var(--wa-green); color: white"
        >
          ➤
        </button>
      </div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import {
        getDatabase,
        ref,
        push,
        onValue,
        update,
        remove,
        onDisconnect,
        query,
        limitToLast,
      } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

      const firebaseConfig = {
        apiKey: "AIzaSyAV3pyiwrB0Cf4e4RxLyATu-i9qnWzX1kY",
        databaseURL:
          "https://sibling-help-app-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "sibling-help-app",
      };

      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);
      const users = {
        F10: "Father",
        M20: "Mother",
        A30: "Akash",
        S40: "Aishwarya",
      };
      let myName = "",
        currentRoom = "",
        typingTimer;

      window.onload = () => {
        const id = localStorage.getItem("fc_id");
        if (id && users[id]) login(users[id]);
      };

      document.getElementById("loginBtn").onclick = () => {
        const id = document.getElementById("idInput").value.toUpperCase();
        if (users[id]) {
          localStorage.setItem("fc_id", id);
          login(users[id]);
        } else alert("Invalid ID");
      };

      function login(u) {
        myName = u;
        document.getElementById("userNameDisp").innerText = u;
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("lobby-screen").style.display = "flex";
        setupStatus();
        renderLobby();
      }

      window.logout = () => {
        localStorage.removeItem("fc_id");
        location.reload();
      };

      function setupStatus() {
        const statusRef = ref(db, `status/${myName}`);
        onValue(ref(db, ".info/connected"), (snap) => {
          if (snap.val()) {
            onDisconnect(statusRef).set({ state: "offline" });
            update(statusRef, { state: "online" });
          }
        });
      }

      function renderLobby() {
        const list = document.getElementById("contact-list");
        list.innerHTML = `<div class="contact-row" onclick="startChat('Family_Group', '🏠 Family Group')"><div class="contact-info">🏠 Family Group</div></div>`;
        Object.values(users).forEach((u) => {
          if (u !== myName) {
            const row = document.createElement("div");
            row.className = "contact-row";
            row.onclick = () => startChat([myName, u].sort().join("_"), u);
            row.innerHTML = `<span id="dot-${u}" class="status-dot offline"></span><div class="contact-info">${u}</div>`;
            list.appendChild(row);
            onValue(ref(db, `status/${u}`), (s) => {
              const d = document.getElementById(`dot-${u}`);
              if (d)
                d.className = `status-dot ${s.val()?.state === "online" ? "online" : "offline"}`;
            });
          }
        });
      }

      // --- TYPING INDICATOR LOGIC ---
      window.updateTypingStatus = () => {
        if (currentRoom === "Family_Group") return;
        update(ref(db, `typing/${currentRoom}`), { [myName]: true });
        clearTimeout(typingTimer);
        typingTimer = setTimeout(() => {
          update(ref(db, `typing/${currentRoom}`), { [myName]: false });
        }, 2000);
      };

      function listenTyping(room) {
        const indicator = document.getElementById("typing-indicator");
        onValue(ref(db, `typing/${room}`), (snap) => {
          const data = snap.val();
          let typingUser = "";
          if (data) {
            Object.keys(data).forEach((user) => {
              if (user !== myName && data[user] === true) typingUser = user;
            });
          }
          indicator.innerText = typingUser ? `${typingUser} is typing...` : "";
          indicator.style.display = typingUser ? "block" : "none";
        });
      }

      // --- BROOM FUNCTION ---
      window.handleClear = () => {
        if (!currentRoom.includes(myName) && currentRoom !== "Family_Group")
          return;
        if (confirm("🧹 Wipe this entire chat history for everyone?")) {
          remove(ref(db, `chats/${currentRoom}`));
        }
      };

      // --- CHAT LOGIC ---
      window.startChat = (room, title) => {
        currentRoom = room;
        document.getElementById("chat-title").innerText = title;
        document.getElementById("lobby-screen").style.display = "none";
        document.getElementById("chat-interface").style.display = "flex";

        listenTyping(room);

        const chatRef = ref(db, `chats/${room}`);
        onValue(chatRef, (snap) => {
          const box = document.getElementById("chat-box");
          box.innerHTML = "";
          const data = snap.val();
          if (data) {
            Object.keys(data).forEach((msgId) => {
              const m = data[msgId];

              // Mark as seen if it's from someone else
              if (m.sender !== myName && !m.seen) {
                update(ref(db, `chats/${room}/${msgId}`), { seen: true });
              }

              const div = document.createElement("div");
              div.className = `msg ${m.sender === myName ? "me" : "them"}`;
              let content =
                m.type === "image"
                  ? `<img src="${m.data}" style="max-width:100%; border-radius:8px">`
                  : m.data;

              // Ticks logic
              let ticks = "";
              if (m.sender === myName) {
                ticks = m.seen
                  ? `<span class="tick-blue">✓✓</span>`
                  : `<span>✓</span>`;
              }

              div.innerHTML = `
                            <b style="font-size:10px">${m.sender}</b><br>${content}
                            <div class="msg-meta">${m.time} ${ticks}</div>
                        `;
              box.appendChild(div);
            });
          }
          box.scrollTop = box.scrollHeight;
        });
      };

      document.getElementById("sendBtn").onclick = () => {
        const t = document.getElementById("msgInput").value.trim();
        if (t) {
          saveMsg({ type: "text", data: t });
          document.getElementById("msgInput").value = "";
          update(ref(db, `typing/${currentRoom}`), { [myName]: false });
        }
      };

      window.uploadFile = (i) => {
        const r = new FileReader();
        r.onload = (e) => saveMsg({ type: "image", data: e.target.result });
        r.readAsDataURL(i.files[0]);
      };

      function saveMsg(m) {
        push(ref(db, `chats/${currentRoom}`), {
          ...m,
          sender: myName,
          time: new Date().toLocaleTimeString([], {
            hour: "2-digit",
            minute: "2-digit",
          }),
          seen: false,
        });
        if (navigator.vibrate) navigator.vibrate(40);
      }

      window.backToLobby = () => {
        document.getElementById("chat-interface").style.display = "none";
        document.getElementById("lobby-screen").style.display = "flex";
      };
    </script>
  </body>
</html>
