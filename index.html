<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Family Connect Ultra</title>
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#075e54" />
    <style>
      :root {
        --wa-green: #075e54;
        --light-green: #dcf8c6;
        --blue-tick: #34b7f1;
        --bg-gray: #e5ddd5;
      }
      body {
        font-family: "Segoe UI", sans-serif;
        margin: 0;
        background: var(--bg-gray);
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* Status */
      .status-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        display: inline-block;
        margin-right: 8px;
        border: 1px solid white;
      }
      .online {
        background: #25d366;
        box-shadow: 0 0 5px #25d366;
      }
      .offline {
        background: #bbb;
      }

      /* Screens */
      #login-screen,
      #lobby-screen {
        position: fixed;
        inset: 0;
        background: #f0f2f5;
        z-index: 100;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      .card {
        background: white;
        padding: 25px;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        width: 90%;
        max-width: 380px;
        text-align: center;
      }

      .contact-row {
        background: white;
        border-bottom: 1px solid #eee;
        padding: 18px;
        display: flex;
        align-items: center;
        cursor: pointer;
      }
      .contact-info {
        flex: 1;
        font-weight: 600;
      }

      /* Chat UI */
      #chat-interface {
        display: none;
        flex-direction: column;
        height: 100vh;
        width: 100%;
        position: absolute;
        top: 0;
        background: var(--bg-gray);
        z-index: 50;
      }
      #chat-header {
        background: var(--wa-green);
        color: white;
        padding: 12px 15px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      #chat-box {
        flex: 1;
        overflow-y: auto;
        padding: 15px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        background-image: url("https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png");
      }

      /* Bubbles */
      .msg {
        padding: 10px;
        border-radius: 12px;
        max-width: 75%;
        font-size: 15px;
        position: relative;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
        cursor: pointer;
      }
      .me {
        align-self: flex-end;
        background: var(--light-green);
        border-top-right-radius: 2px;
      }
      .them {
        align-self: flex-start;
        background: white;
        border-top-left-radius: 2px;
      }

      .reaction-picker {
        position: absolute;
        top: -45px;
        left: 0;
        background: white;
        padding: 5px;
        border-radius: 20px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        display: none;
        gap: 8px;
        z-index: 60;
      }
      .reaction-container {
        position: absolute;
        bottom: -12px;
        left: 5px;
        background: white;
        border-radius: 10px;
        padding: 1px 4px;
        font-size: 12px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
      }

      #input-area {
        background: #f0f0f0;
        padding: 10px;
        display: flex;
        gap: 8px;
        align-items: center;
      }
      #msgInput {
        flex: 1;
        padding: 12px;
        border-radius: 25px;
        border: 1px solid #ddd;
        outline: none;
      }
      .btn-round {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        border: none;
        cursor: pointer;
      }
      .recording {
        background: #ff4b2b !important;
        color: white !important;
        animation: pulse 1s infinite;
      }

      @keyframes pulse {
        0% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
        100% {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div id="login-screen">
      <div class="card">
        <h2 style="color: var(--wa-green)">Family Connect</h2>
        <input type="password" id="idInput" placeholder="Enter Secret ID" />
        <button
          onclick="checkLogin()"
          style="
            width: 100%;
            padding: 12px;
            background: var(--wa-green);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
          "
        >
          ENTER HOUSE
        </button>
      </div>
    </div>

    <div id="lobby-screen" style="display: none">
      <div
        class="card"
        style="padding: 0; overflow: hidden; width: 95%; max-height: 80vh"
      >
        <div
          style="
            background: var(--wa-green);
            color: white;
            padding: 15px;
            text-align: left;
            display: flex;
            justify-content: space-between;
          "
        >
          <h3 style="margin: 0">Family Hub</h3>
          <span
            id="my-name-display"
            style="font-size: 12px; opacity: 0.8"
          ></span>
        </div>
        <div id="contact-list" style="overflow-y: auto"></div>
      </div>
    </div>

    <div id="chat-interface">
      <div id="chat-header">
        <div style="display: flex; align-items: center; gap: 10px">
          <button
            onclick="backToLobby()"
            style="
              background: none;
              border: none;
              color: white;
              font-size: 24px;
            "
          >
            ←
          </button>
          <span id="chat-title" style="font-weight: bold">Chat</span>
        </div>
        <button
          id="admin-clean-btn"
          style="
            background: none;
            border: none;
            color: white;
            font-size: 18px;
            display: none;
          "
          onclick="secureClearHistory()"
        >
          🧹
        </button>
      </div>
      <div id="chat-box"></div>
      <div id="input-area">
        <label style="cursor: pointer; font-size: 22px"
          >📎<input
            type="file"
            accept="image/*"
            style="display: none"
            onchange="uploadFile(this, 'image')"
        /></label>
        <input type="text" id="msgInput" placeholder="Message..." />
        <button
          id="micBtn"
          class="btn-round"
          onclick="toggleRecording()"
          style="background: white; font-size: 18px"
        >
          🎙️
        </button>
        <button
          id="sendBtn"
          class="btn-round"
          onclick="sendText()"
          style="background: var(--wa-green); color: white"
        >
          ➤
        </button>
      </div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import {
        getDatabase,
        ref,
        push,
        onValue,
        update,
        remove,
        onDisconnect,
        serverTimestamp,
        query,
        limitToLast,
      } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

      // CONFIG: PASTE YOUR FIREBASE DETAILS HERE
      const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        databaseURL: "YOUR_DB_URL",
        projectId: "YOUR_PROJECT_ID",
      };

      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);
      const users = {
        F10: "Father",
        M20: "Mother",
        A30: "Akash",
        S40: "Aishwarya",
      };
      let myName = "",
        currentRoom = "",
        mediaRecorder = null,
        audioChunks = [];

      window.checkLogin = () => {
        const id = document.getElementById("idInput").value.toUpperCase();
        if (users[id]) {
          myName = users[id];
          document.getElementById("my-name-display").innerText = myName;
          document.getElementById("login-screen").style.display = "none";
          document.getElementById("lobby-screen").style.display = "flex";

          // --- ADMIN BUTTON LOCK ---
          if (myName === "Akash") {
            document.getElementById("admin-clean-btn").style.display = "block";
          }

          setupStatus();
          renderLobby();
        } else {
          alert("Access Denied.");
        }
      };

      function setupStatus() {
        const myStatusRef = ref(db, `status/${myName}`);
        onValue(ref(db, ".info/connected"), (snap) => {
          if (snap.val() === true) {
            onDisconnect(myStatusRef).update({
              state: "offline",
              lastSeen: serverTimestamp(),
            });
            update(myStatusRef, { state: "online" });
          }
        });
      }

      function renderLobby() {
        const list = document.getElementById("contact-list");
        list.innerHTML = `<div class="contact-row" onclick="startChat('Family_Group', '🏠 Family Group')">
                <div class="contact-info">🏠 Family Group</div>
            </div>`;

        Object.values(users).forEach((u) => {
          if (u !== myName) {
            const row = document.createElement("div");
            row.className = "contact-row";
            row.onclick = () => startChat([myName, u].sort().join("_"), u);
            row.innerHTML = `<span id="dot-${u}" class="status-dot offline"></span>
                                    <div class="contact-info">${u}</div>`;
            list.appendChild(row);

            onValue(ref(db, `status/${u}`), (s) => {
              const dot = document.getElementById(`dot-${u}`);
              if (dot)
                dot.className = `status-dot ${s.val()?.state === "online" ? "online" : "offline"}`;
            });
          }
        });
      }

      // --- THE "FORT KNOX" CLEANER ---
      window.secureClearHistory = () => {
        // LAYER 1: HARD IDENTITY LOCK
        if (myName !== "Akash") {
          alert("Security Error: Only Akash has Admin Clear privileges.");
          return;
        }

        // LAYER 2: ROOM MEMBERSHIP LOCK
        // Check if Akash is part of the current room name
        if (!currentRoom.includes("Akash") && currentRoom !== "Family_Group") {
          alert(
            "Restricted: You can only clear your own chats or the Family Group.",
          );
          return;
        }

        // LAYER 3: SECRET ID CHALLENGE
        const verify = prompt(
          "ADMIN ACTION: To wipe this chat, enter your Secret ID (A30):",
        );

        if (verify === "A30") {
          if (
            confirm(
              "Are you sure? This deletes ALL messages for ALL users in this room.",
            )
          ) {
            remove(ref(db, `chats/${currentRoom}`))
              .then(() => alert("Chat History Wiped! 🧹"))
              .catch((err) => alert("Wipe failed: " + err.message));
          }
        } else {
          alert("Wipe Cancelled: Incorrect ID.");
        }
      };

      // --- VOICE MESSAGES ---
      window.toggleRecording = async () => {
        const btn = document.getElementById("micBtn");
        if (!mediaRecorder || mediaRecorder.state === "inactive") {
          const stream = await navigator.mediaDevices.getUserMedia({
            audio: true,
          });
          mediaRecorder = new MediaRecorder(stream);
          audioChunks = [];
          mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
          mediaRecorder.onstop = () => {
            const blob = new Blob(audioChunks, { type: "audio/webm" });
            const reader = new FileReader();
            reader.onloadend = () =>
              saveMsg({ type: "voice", data: reader.result });
            reader.readAsDataURL(blob);
          };
          mediaRecorder.start();
          btn.classList.add("recording");
        } else {
          mediaRecorder.stop();
          btn.classList.remove("recording");
        }
      };

      window.startChat = (room, title) => {
        currentRoom = room;
        document.getElementById("chat-title").innerText = title;
        document.getElementById("lobby-screen").style.display = "none";
        document.getElementById("chat-interface").style.display = "flex";
        listenMessages();
      };

      window.sendText = () => {
        const t = document.getElementById("msgInput").value.trim();
        if (t) {
          saveMsg({ type: "text", data: t });
          document.getElementById("msgInput").value = "";
        }
      };

      window.uploadFile = (input, type) => {
        const reader = new FileReader();
        reader.onload = (e) => saveMsg({ type: type, data: e.target.result });
        reader.readAsDataURL(input.files[0]);
      };

      function saveMsg(m) {
        push(ref(db, `chats/${currentRoom}`), {
          ...m,
          sender: myName,
          time: new Date().toLocaleTimeString([], {
            hour: "2-digit",
            minute: "2-digit",
          }),
          timestamp: Date.now(),
          seen: false,
        });
        if (navigator.vibrate) navigator.vibrate(40);
      }

      function listenMessages() {
        const box = document.getElementById("chat-box");
        onValue(
          query(ref(db, `chats/${currentRoom}`), limitToLast(50)),
          (snap) => {
            box.innerHTML = "";
            const data = snap.val();
            if (data)
              Object.keys(data).forEach((id) => {
                const m = data[id];
                const div = document.createElement("div");
                div.className = `msg ${m.sender === myName ? "me" : "them"}`;

                let content =
                  m.type === "text"
                    ? m.data
                    : m.type === "image"
                      ? `<img src="${m.data}" style="max-width:100%; border-radius:8px">`
                      : `<audio controls src="${m.data}"></audio>`;
                let reacts = m.reactions
                  ? `<div class="reaction-container">${Object.values(m.reactions).join("")}</div>`
                  : "";

                div.innerHTML = `<b style="font-size:10px">${m.sender}</b><br>${content}${reacts}
                                     <div class="reaction-picker">
                                        <span onclick="react('${id}','❤️')">❤️</span><span onclick="react('${id}','😂')">😂</span><span onclick="react('${id}','👍')">👍</span>
                                     </div>`;

                div.onclick = (e) => {
                  e.stopPropagation();
                  const p = div.querySelector(".reaction-picker");
                  p.style.display =
                    p.style.display === "flex" ? "none" : "flex";
                };
                box.appendChild(div);
              });
            box.scrollTop = box.scrollHeight;
          },
        );
      }

      window.react = (msgId, emoji) => {
        update(ref(db, `chats/${currentRoom}/${msgId}/reactions`), {
          [myName]: emoji,
        });
      };
      window.backToLobby = () => {
        document.getElementById("chat-interface").style.display = "none";
        document.getElementById("lobby-screen").style.display = "flex";
      };
    </script>
  </body>
</html>
