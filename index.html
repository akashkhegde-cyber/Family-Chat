<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Family Connect Pro</title>
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#075e54" />
    <link rel="icon" type="image/png" href="chat-icon.png" />
    <style>
      :root {
        --wa-green: #075e54;
        --light-green: #dcf8c6;
        --bg-gray: #e5ddd5;
        --blue-tick: #34b7f1;
      }
      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }
      body {
        font-family: -apple-system, sans-serif;
        margin: 0;
        background: var(--bg-gray);
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* Login Screens */
      #auth-container {
        position: fixed;
        inset: 0;
        background: #f0f2f5;
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .card {
        background: white;
        padding: 30px;
        border-radius: 24px;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 400px;
        text-align: center;
      }
      input {
        width: 100%;
        padding: 15px;
        margin-bottom: 15px;
        border-radius: 12px;
        border: 1px solid #ddd;
        font-size: 18px;
        text-align: center;
      }
      .btn-main {
        width: 100%;
        padding: 15px;
        background: var(--wa-green);
        color: white;
        border: none;
        border-radius: 12px;
        font-weight: bold;
        cursor: pointer;
      }

      /* Chat UI */
      #lobby-screen,
      #chat-interface {
        display: none;
        height: 100vh;
        flex-direction: column;
      }
      .contact-row {
        background: white;
        border-bottom: 1px solid #eee;
        padding: 20px;
        display: flex;
        align-items: center;
        cursor: pointer;
      }
      #chat-header {
        background: var(--wa-green);
        color: white;
        padding: 15px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding-top: env(safe-area-inset-top);
      }
      #chat-box {
        flex: 1;
        overflow-y: auto;
        padding: 15px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        background-image: url("https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png");
      }

      .msg {
        padding: 12px;
        border-radius: 16px;
        max-width: 85%;
        font-size: 16px;
        position: relative;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.15);
      }
      .me {
        align-self: flex-end;
        background: var(--light-green);
        border-top-right-radius: 4px;
      }
      .them {
        align-self: flex-start;
        background: white;
        border-top-left-radius: 4px;
      }
      .msg-meta {
        font-size: 11px;
        opacity: 0.6;
        text-align: right;
        margin-top: 5px;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 4px;
      }

      #input-area {
        background: #f0f0f0;
        padding: 12px;
        display: flex;
        gap: 10px;
        align-items: center;
        padding-bottom: calc(12px + env(safe-area-inset-bottom));
      }
      .btn-round {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        border: none;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }
      .recording {
        background: #ff4b2b !important;
        color: white;
      }
    </style>
  </head>
  <body>
    <div id="auth-container">
      <div id="step-id" class="card">
        <img
          src="chat-icon.png"
          width="80"
          style="border-radius: 20px; margin-bottom: 15px"
        />
        <h2 style="color: var(--wa-green)">Family Connect</h2>
        <input type="password" id="idInput" placeholder="Secret ID" />
        <button class="btn-main" onclick="checkID()">CONTINUE</button>
      </div>

      <div id="step-pin" class="card" style="display: none">
        <h2 id="pin-title">Secure Login</h2>
        <p id="pin-subtext" style="font-size: 14px; color: #666"></p>
        <input
          type="number"
          id="pinInput"
          placeholder="4-Digit PIN"
          pattern="\d*"
          inputmode="numeric"
        />
        <button class="btn-main" onclick="verifyPin()">LOG IN</button>
      </div>
    </div>

    <div id="lobby-screen">
      <div style="background: var(--wa-green); color: white; padding: 20px">
        <h3 style="margin: 0">Family Hub</h3>
      </div>
      <div
        id="contact-list"
        style="flex: 1; overflow-y: auto; background: white"
      ></div>
      <button
        onclick="logout()"
        style="
          padding: 15px;
          color: red;
          border: none;
          background: none;
          font-weight: bold;
        "
      >
        LOGOUT DEVICE
      </button>
    </div>

    <div id="chat-interface">
      <div id="chat-header">
        <button
          onclick="backToLobby()"
          style="background: none; border: none; color: white; font-size: 24px"
        >
          ←
        </button>
        <div style="text-align: center">
          <b id="chat-title">Chat</b>
          <div id="typing-indicator" style="font-size: 10px; display: none">
            typing...
          </div>
        </div>
        <button
          onclick="handleClear()"
          style="background: none; border: none; color: white; font-size: 24px"
        >
          🧹
        </button>
      </div>
      <div id="chat-box"></div>
      <div id="input-area">
        <label style="font-size: 24px"
          >📎<input
            type="file"
            style="display: none"
            onchange="uploadFile(this)"
        /></label>
        <input
          type="text"
          id="msgInput"
          placeholder="Message..."
          oninput="updateTypingStatus()"
        />
        <button id="micBtn" class="btn-round" onclick="toggleRecording()">
          🎙️
        </button>
        <button
          id="sendBtn"
          class="btn-round"
          style="background: var(--wa-green); color: white"
        >
          ➤
        </button>
      </div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import {
        getDatabase,
        ref,
        push,
        onValue,
        update,
        remove,
        onDisconnect,
        get,
      } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

      const firebaseConfig = {
        apiKey: "AIzaSyAV3pyiwrB0Cf4e4RxLyATu-i9qnWzX1kY",
        databaseURL:
          "https://sibling-help-app-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "sibling-help-app",
      };

      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);
      const users = {
        F10: "Father",
        M20: "Mother",
        A30: "Akash",
        S40: "Aishwarya",
      };
      let myName = "",
        currentRoom = "",
        tempID = "",
        mediaRecorder,
        audioChunks = [];

      // Check persistent login
      window.onload = () => {
        const savedID = localStorage.getItem("fc_id");
        const savedPin = localStorage.getItem("fc_pin");
        if (savedID && savedPin) {
          tempID = savedID;
          verifyPin(savedPin);
        }
      };

      window.checkID = async () => {
        const id = document.getElementById("idInput").value.toUpperCase();
        if (!users[id]) return alert("Invalid ID");
        tempID = id;

        const snapshot = await get(ref(db, `pins/${id}`));
        const hasPin = snapshot.exists();

        document.getElementById("step-id").style.display = "none";
        document.getElementById("step-pin").style.display = "block";
        document.getElementById("pin-title").innerText = hasPin
          ? "Enter PIN"
          : "Setup PIN";
        document.getElementById("pin-subtext").innerText = hasPin
          ? `Enter PIN for ${users[id]}`
          : `Create a 4-digit PIN for ${users[id]}`;
      };

      window.verifyPin = async (providedPin) => {
        const pin = providedPin || document.getElementById("pinInput").value;
        if (pin.length < 4) return alert("PIN must be 4 digits");

        const pinRef = ref(db, `pins/${tempID}`);
        const snapshot = await get(pinRef);

        if (!snapshot.exists()) {
          await update(ref(db, `pins`), { [tempID]: pin });
          proceedLogin(pin);
        } else if (snapshot.val() === pin) {
          proceedLogin(pin);
        } else {
          alert("Incorrect PIN!");
        }
      };

      function proceedLogin(pin) {
        localStorage.setItem("fc_id", tempID);
        localStorage.setItem("fc_pin", pin);
        myName = users[tempID];
        document.getElementById("auth-container").style.display = "none";
        document.getElementById("lobby-screen").style.display = "flex";
        setupStatus();
        renderLobby();
      }

      // --- REST OF THE APP LOGIC (Lobby, Chat, Broom, Voice) ---
      function setupStatus() {
        const sRef = ref(db, `status/${myName}`);
        onValue(ref(db, ".info/connected"), (s) => {
          if (s.val()) {
            onDisconnect(sRef).set({ state: "offline" });
            update(sRef, { state: "online" });
          }
        });
      }

      function renderLobby() {
        const list = document.getElementById("contact-list");
        list.innerHTML = `<div class="contact-row" onclick="startChat('Family_Group', '🏠 Family Group')">🏠 Family Group</div>`;
        Object.values(users).forEach((u) => {
          if (u !== myName) {
            const row = document.createElement("div");
            row.className = "contact-row";
            row.onclick = () => startChat([myName, u].sort().join("_"), u);
            row.innerHTML = `<span id="dot-${u}" style="width:10px;height:10px;border-radius:50%;margin-right:10px;background:#bbb;"></span>${u}`;
            list.appendChild(row);
            onValue(ref(db, `status/${u}`), (s) => {
              const d = document.getElementById(`dot-${u}`);
              if (d)
                d.style.background =
                  s.val()?.state === "online" ? "#25d366" : "#bbb";
            });
          }
        });
      }

      window.startChat = (room, title) => {
        currentRoom = room;
        document.getElementById("chat-title").innerText = title;
        document.getElementById("lobby-screen").style.display = "none";
        document.getElementById("chat-interface").style.display = "flex";
        onValue(ref(db, `chats/${room}`), (snap) => {
          const box = document.getElementById("chat-box");
          box.innerHTML = "";
          const data = snap.val();
          if (data)
            Object.keys(data).forEach((id) => {
              const m = data[id];
              if (m.sender !== myName && !m.seen)
                update(ref(db, `chats/${room}/${id}`), { seen: true });
              const div = document.createElement("div");
              div.className = `msg ${m.sender === myName ? "me" : "them"}`;
              let content =
                m.type === "image"
                  ? `<img src="${m.data}" style="width:100%; border-radius:8px">`
                  : m.type === "voice"
                    ? `<audio controls src="${m.data}" style="width:200px"></audio>`
                    : m.data;
              let ticks = m.sender === myName ? (m.seen ? "✓✓" : "✓") : "";
              div.innerHTML = `<small>${m.sender}</small><br>${content}<div class="msg-meta">${m.time} ${ticks}</div>`;
              box.appendChild(div);
            });
          box.scrollTop = box.scrollHeight;
        });
      };

      window.handleClear = () => {
        if (confirm("🧹 Clear history?"))
          remove(ref(db, `chats/${currentRoom}`));
      };
      window.backToLobby = () => {
        document.getElementById("chat-interface").style.display = "none";
        document.getElementById("lobby-screen").style.display = "flex";
      };
      window.logout = () => {
        localStorage.clear();
        location.reload();
      };

      // Send Logic
      document.getElementById("sendBtn").onclick = () => {
        const val = document.getElementById("msgInput").value;
        if (val) {
          saveMsg({ type: "text", data: val });
          document.getElementById("msgInput").value = "";
        }
      };

      window.toggleRecording = async () => {
        const btn = document.getElementById("micBtn");
        if (!mediaRecorder || mediaRecorder.state === "inactive") {
          const stream = await navigator.mediaDevices.getUserMedia({
            audio: true,
          });
          mediaRecorder = new MediaRecorder(stream);
          audioChunks = [];
          mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
          mediaRecorder.onstop = () => {
            const reader = new FileReader();
            reader.onloadend = () =>
              saveMsg({ type: "voice", data: reader.result });
            reader.readAsDataURL(new Blob(audioChunks));
          };
          mediaRecorder.start();
          btn.classList.add("recording");
        } else {
          mediaRecorder.stop();
          btn.classList.remove("recording");
        }
      };

      function saveMsg(obj) {
        push(ref(db, `chats/${currentRoom}`), {
          ...obj,
          sender: myName,
          seen: false,
          time: new Date().toLocaleTimeString([], {
            hour: "2-digit",
            minute: "2-digit",
          }),
        });
      }
    </script>
  </body>
</html>
