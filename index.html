<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Family Connect Ultra</title>
    <link rel="manifest" href="manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <link rel="apple-touch-icon" href="chat-icon.png" />
    <meta name="theme-color" content="#075e54" />
    <style>
      :root {
        --wa-green: #075e54;
        --light-green: #dcf8c6;
        --bg-gray: #e5ddd5;
        --blue-tick: #34b7f1;
      }
      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }
      body {
        font-family: -apple-system, sans-serif;
        margin: 0;
        background: var(--bg-gray);
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* Auth & Settings */
      #auth-container,
      #settings-screen {
        position: fixed;
        inset: 0;
        background: #f0f2f5;
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .card {
        background: white;
        padding: 30px;
        border-radius: 24px;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 400px;
        text-align: center;
      }
      input {
        width: 100%;
        padding: 15px;
        margin-bottom: 15px;
        border-radius: 12px;
        border: 1px solid #ddd;
        font-size: 18px;
        text-align: center;
      }
      .btn-main {
        width: 100%;
        padding: 15px;
        background: var(--wa-green);
        color: white;
        border: none;
        border-radius: 12px;
        font-weight: bold;
        cursor: pointer;
      }

      /* Interface */
      #lobby-screen,
      #chat-interface {
        display: none;
        height: 100vh;
        flex-direction: column;
      }
      .header {
        background: var(--wa-green);
        color: white;
        padding: 15px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding-top: env(safe-area-inset-top);
      }
      #chat-box {
        flex: 1;
        overflow-y: auto;
        padding: 15px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        background-image: url("https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png");
      }

      /* Bubbles */
      .msg {
        padding: 10px 14px;
        border-radius: 16px;
        max-width: 80%;
        font-size: 16px;
        position: relative;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
        word-wrap: break-word;
      }
      .me {
        align-self: flex-end;
        background: var(--light-green);
        border-top-right-radius: 4px;
        cursor: pointer;
      }
      .them {
        align-self: flex-start;
        background: white;
        border-top-left-radius: 4px;
      }
      .msg-meta {
        font-size: 10px;
        opacity: 0.5;
        text-align: right;
        margin-top: 4px;
        display: flex;
        justify-content: flex-end;
        align-items: center;
        gap: 3px;
      }
      .tick-blue {
        color: var(--blue-tick);
        font-weight: bold;
      }

      /* Input Footer */
      #input-area {
        background: #f0f0f0;
        padding: 10px;
        display: flex;
        gap: 8px;
        align-items: center;
        padding-bottom: calc(10px + env(safe-area-inset-bottom));
      }
      #msgInput {
        flex: 1;
        padding: 12px 18px;
        border-radius: 25px;
        border: 1px solid #ddd;
        font-size: 16px;
        outline: none;
      }
      .btn-round {
        width: 45px;
        height: 45px;
        border-radius: 50%;
        border: none;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        cursor: pointer;
        flex-shrink: 0;
      }

      /* Recording Animation */
      .recording {
        background: #ff4b2b !important;
        color: white !important;
        animation: pulse 1s infinite;
      }
      @keyframes pulse {
        0% {
          scale: 1;
        }
        50% {
          scale: 1.1;
        }
        100% {
          scale: 1;
        }
      }

      audio {
        height: 35px;
        width: 180px;
      }
    </style>
  </head>
  <body>
    <div id="auth-container">
      <div id="step-id" class="card">
        <h2 style="color: var(--wa-green)">Family Connect</h2>
        <input type="password" id="idInput" placeholder="Secret ID" />
        <button class="btn-main" onclick="checkID()">CONTINUE</button>
      </div>
      <div id="step-pin" class="card" style="display: none">
        <h2 id="pin-title">Enter PIN</h2>
        <input
          type="number"
          id="pinInput"
          placeholder="4-Digit PIN"
          pattern="\d*"
          inputmode="numeric"
        />
        <button class="btn-main" onclick="verifyPin()">LOG IN</button>
      </div>
    </div>

    <div id="settings-screen" style="display: none">
      <div class="card">
        <h3>Update PIN</h3>
        <input type="number" id="newPinInput" placeholder="New PIN" />
        <button class="btn-main" onclick="updatePin()">SAVE</button>
        <button
          class="btn-main"
          style="background: #888; margin-top: 10px"
          onclick="toggleSettings(false)"
        >
          BACK
        </button>
      </div>
    </div>

    <div id="lobby-screen">
      <div class="header">
        <h3>Family Hub</h3>
        <button
          onclick="toggleSettings(true)"
          style="background: none; border: none; font-size: 20px"
        >
          ⚙️
        </button>
      </div>
      <div
        id="contact-list"
        style="flex: 1; overflow-y: auto; background: white"
      ></div>
      <button
        onclick="logout()"
        style="
          padding: 15px;
          color: red;
          border: none;
          background: none;
          font-weight: bold;
        "
      >
        LOGOUT DEVICE
      </button>
    </div>

    <div id="chat-interface">
      <div class="header">
        <button
          onclick="backToLobby()"
          style="background: none; border: none; color: white; font-size: 24px"
        >
          ←
        </button>
        <b id="chat-title">Chat</b>
        <button
          onclick="handleClear()"
          style="background: none; border: none; color: white; font-size: 24px"
        >
          🧹
        </button>
      </div>
      <div id="chat-box"></div>
      <div id="input-area">
        <label style="font-size: 24px; padding: 0 5px; cursor: pointer"
          >🖼️<input
            type="file"
            accept="image/*"
            style="display: none"
            onchange="uploadFile(this)"
        /></label>
        <input
          type="text"
          id="msgInput"
          placeholder="Message..."
          autocomplete="off"
        />
        <button
          id="micBtn"
          class="btn-round"
          onclick="toggleRecording()"
          style="background: white"
        >
          🎙️
        </button>
        <button
          id="sendBtn"
          class="btn-round"
          style="background: var(--wa-green); color: white"
        >
          ➤
        </button>
      </div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import {
        getDatabase,
        ref,
        push,
        onValue,
        update,
        remove,
        get,
      } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

      const firebaseConfig = {
        apiKey: "AIzaSyAV3pyiwrB0Cf4e4RxLyATu-i9qnWzX1kY",
        databaseURL:
          "https://sibling-help-app-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "sibling-help-app",
      };

      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);
      const users = {
        F10: "Father",
        M20: "Mother",
        A30: "Akash",
        S40: "Aishwarya",
      };
      let myName = "",
        currentRoom = "",
        tempID = "",
        mediaRecorder,
        audioChunks = [];

      window.onload = () => {
        const id = localStorage.getItem("fc_id"),
          pin = localStorage.getItem("fc_pin");
        if (id && pin) {
          tempID = id;
          verifyPin(pin);
        }
      };

      window.checkID = async () => {
        const id = document.getElementById("idInput").value.toUpperCase();
        if (!users[id]) return alert("Invalid ID");
        tempID = id;
        const snapshot = await get(ref(db, `pins/${id}`));
        document.getElementById("step-id").style.display = "none";
        document.getElementById("step-pin").style.display = "block";
        document.getElementById("pin-title").innerText = snapshot.exists()
          ? "Enter PIN"
          : "Setup PIN";
      };

      window.verifyPin = async (providedPin) => {
        const pin = providedPin || document.getElementById("pinInput").value;
        const snapshot = await get(ref(db, `pins/${tempID}`));
        if (!snapshot.exists() || snapshot.val() === pin) {
          if (!snapshot.exists())
            await update(ref(db, `pins`), { [tempID]: pin });
          localStorage.setItem("fc_id", tempID);
          localStorage.setItem("fc_pin", pin);
          myName = users[tempID];
          document.getElementById("auth-container").style.display = "none";
          document.getElementById("lobby-screen").style.display = "flex";
          renderLobby();
        } else alert("Wrong PIN");
      };

      window.toggleSettings = (s) =>
        (document.getElementById("settings-screen").style.display = s
          ? "flex"
          : "none");
      window.updatePin = async () => {
        const p = document.getElementById("newPinInput").value;
        if (p.length < 4) return alert("4 digits min");
        await update(ref(db, `pins`), { [tempID]: p });
        localStorage.setItem("fc_pin", p);
        alert("Saved!");
        toggleSettings(false);
      };

      function renderLobby() {
        const list = document.getElementById("contact-list");
        list.innerHTML = `<div style="padding:20px; border-bottom:1px solid #eee; font-weight:bold;" onclick="startChat('Family_Group', '🏠 Family Group')">🏠 Family Group</div>`;
        Object.values(users).forEach((u) => {
          if (u !== myName) {
            const d = document.createElement("div");
            d.style.padding = "20px";
            d.style.borderBottom = "1px solid #eee";
            d.innerText = u;
            d.onclick = () => startChat([myName, u].sort().join("_"), u);
            list.appendChild(d);
          }
        });
      }

      window.startChat = (room, title) => {
        currentRoom = room;
        document.getElementById("chat-title").innerText = title;
        document.getElementById("lobby-screen").style.display = "none";
        document.getElementById("chat-interface").style.display = "flex";
        onValue(ref(db, `chats/${room}`), (snap) => {
          const box = document.getElementById("chat-box");
          box.innerHTML = "";
          const data = snap.val();
          if (data)
            Object.keys(data).forEach((id) => {
              const m = data[id];
              if (m.sender !== myName && !m.seen)
                update(ref(db, `chats/${room}/${id}`), { seen: true });
              const div = document.createElement("div");
              div.className = `msg ${m.sender === myName ? "me" : "them"}`;

              let content = "";
              if (m.type === "image")
                content = `<img src="${m.data}" style="width:100%; border-radius:10px; display:block">`;
              else if (m.type === "voice")
                content = `<audio controls src="${m.data}"></audio>`;
              else content = m.data;

              let ticks =
                m.sender === myName
                  ? m.seen
                    ? '<span class="tick-blue">✓✓</span>'
                    : "✓"
                  : "";
              div.innerHTML = `<small style="font-size:10px; color:#555">${m.sender}</small><br>${content}<div class="msg-meta">${m.time} ${ticks}</div>`;

              if (m.sender === myName) {
                div.onclick = () => {
                  if (confirm("Delete for everyone?"))
                    remove(ref(db, `chats/${currentRoom}/${id}`));
                };
              }
              box.appendChild(div);
            });
          box.scrollTop = box.scrollHeight;
        });
      };

      // --- VOICE RECORDING LOGIC (RESTORED & FIXED) ---
      window.toggleRecording = async () => {
        const btn = document.getElementById("micBtn");
        try {
          if (!mediaRecorder || mediaRecorder.state === "inactive") {
            const stream = await navigator.mediaDevices.getUserMedia({
              audio: true,
            });
            // Determine format based on browser
            const mimeType = MediaRecorder.isTypeSupported("audio/webm")
              ? "audio/webm"
              : "audio/ogg";
            mediaRecorder = new MediaRecorder(stream, { mimeType });
            audioChunks = [];

            mediaRecorder.ondataavailable = (e) => {
              if (e.data.size > 0) audioChunks.push(e.data);
            };
            mediaRecorder.onstop = () => {
              const audioBlob = new Blob(audioChunks, { type: mimeType });
              const reader = new FileReader();
              reader.onloadend = () =>
                saveMsg({ type: "voice", data: reader.result });
              reader.readAsDataURL(audioBlob);
              stream.getTracks().forEach((track) => track.stop()); // Close mic
            };

            mediaRecorder.start();
            btn.classList.add("recording");
            if (navigator.vibrate) navigator.vibrate(100);
          } else {
            mediaRecorder.stop();
            btn.classList.remove("recording");
          }
        } catch (err) {
          alert("Please allow microphone access in settings!");
        }
      };

      window.uploadFile = (input) => {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) =>
          saveMsg({ type: "image", data: e.target.result });
        reader.readAsDataURL(file);
      };

      function saveMsg(obj) {
        push(ref(db, `chats/${currentRoom}`), {
          ...obj,
          sender: myName,
          seen: false,
          time: new Date().toLocaleTimeString([], {
            hour: "2-digit",
            minute: "2-digit",
          }),
        });
      }

      window.handleClear = () => {
        if (confirm("🧹 Clear whole chat history?"))
          remove(ref(db, `chats/${currentRoom}`));
      };
      window.backToLobby = () => {
        document.getElementById("chat-interface").style.display = "none";
        document.getElementById("lobby-screen").style.display = "flex";
      };
      window.logout = () => {
        localStorage.clear();
        location.reload();
      };
      document.getElementById("sendBtn").onclick = () => {
        const val = document.getElementById("msgInput").value.trim();
        if (val) {
          saveMsg({ type: "text", data: val });
          document.getElementById("msgInput").value = "";
        }
      };
    </script>
  </body>
</html>
