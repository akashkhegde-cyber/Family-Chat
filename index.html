<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Family Connect Pro</title>
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#075e54" />
    <link rel="icon" type="image/png" href="chat-icon.png" />
    <style>
      :root {
        --wa-green: #075e54;
        --light-green: #dcf8c6;
        --bg-gray: #e5ddd5;
        --blue-tick: #34b7f1;
      }
      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }
      body {
        font-family: -apple-system, sans-serif;
        margin: 0;
        background: var(--bg-gray);
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* Screens */
      #auth-container,
      #settings-screen {
        position: fixed;
        inset: 0;
        background: #f0f2f5;
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .card {
        background: white;
        padding: 30px;
        border-radius: 24px;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 400px;
        text-align: center;
      }
      input {
        width: 100%;
        padding: 15px;
        margin-bottom: 15px;
        border-radius: 12px;
        border: 1px solid #ddd;
        font-size: 18px;
        text-align: center;
      }
      .btn-main {
        width: 100%;
        padding: 15px;
        background: var(--wa-green);
        color: white;
        border: none;
        border-radius: 12px;
        font-weight: bold;
        cursor: pointer;
        margin-bottom: 10px;
      }

      /* Lobby & Chat */
      #lobby-screen,
      #chat-interface {
        display: none;
        height: 100vh;
        flex-direction: column;
      }
      .contact-row {
        background: white;
        border-bottom: 1px solid #eee;
        padding: 20px;
        display: flex;
        align-items: center;
        cursor: pointer;
      }
      #chat-header,
      .lobby-header {
        background: var(--wa-green);
        color: white;
        padding: 15px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding-top: env(safe-area-inset-top);
      }
      #chat-box {
        flex: 1;
        overflow-y: auto;
        padding: 15px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        background-image: url("https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png");
      }

      .msg {
        padding: 12px;
        border-radius: 16px;
        max-width: 85%;
        font-size: 16px;
        position: relative;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.15);
      }
      .me {
        align-self: flex-end;
        background: var(--light-green);
        border-top-right-radius: 4px;
      }
      .them {
        align-self: flex-start;
        background: white;
        border-top-left-radius: 4px;
      }

      #input-area {
        background: #f0f0f0;
        padding: 12px;
        display: flex;
        gap: 10px;
        align-items: center;
        padding-bottom: calc(12px + env(safe-area-inset-bottom));
      }
      .btn-round {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        border: none;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="auth-container">
      <div id="step-id" class="card">
        <img
          src="chat-icon.png"
          width="80"
          style="border-radius: 20px; margin-bottom: 15px"
        />
        <h2 style="color: var(--wa-green)">Family Connect</h2>
        <input type="password" id="idInput" placeholder="Secret ID" />
        <button class="btn-main" onclick="checkID()">CONTINUE</button>
      </div>

      <div id="step-pin" class="card" style="display: none">
        <h2 id="pin-title">Secure Login</h2>
        <p id="pin-subtext" style="font-size: 14px; color: #666"></p>
        <input
          type="number"
          id="pinInput"
          placeholder="4-Digit PIN"
          pattern="\d*"
          inputmode="numeric"
        />
        <button class="btn-main" onclick="verifyPin()">LOG IN</button>
      </div>
    </div>

    <div id="settings-screen" style="display: none">
      <div class="card">
        <h2 style="color: var(--wa-green)">Account Settings</h2>
        <p style="font-size: 14px; color: #666">Change your 4-digit PIN</p>
        <input
          type="number"
          id="newPinInput"
          placeholder="Enter New PIN"
          pattern="\d*"
          inputmode="numeric"
        />
        <button class="btn-main" onclick="updatePin()">SAVE NEW PIN</button>
        <button
          class="btn-main"
          style="background: #888"
          onclick="toggleSettings(false)"
        >
          CANCEL
        </button>
      </div>
    </div>

    <div id="lobby-screen">
      <div class="lobby-header">
        <h3 style="margin: 0">Family Hub</h3>
        <button
          onclick="toggleSettings(true)"
          style="
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
          "
        >
          ⚙️
        </button>
      </div>
      <div
        id="contact-list"
        style="flex: 1; overflow-y: auto; background: white"
      ></div>
      <button
        onclick="logout()"
        style="
          padding: 15px;
          color: red;
          border: none;
          background: none;
          font-weight: bold;
        "
      >
        LOGOUT DEVICE
      </button>
    </div>

    <div id="chat-interface">
      <div id="chat-header">
        <button
          onclick="backToLobby()"
          style="background: none; border: none; color: white; font-size: 24px"
        >
          ←
        </button>
        <div style="text-align: center"><b id="chat-title">Chat</b></div>
        <button
          onclick="handleClear()"
          style="background: none; border: none; color: white; font-size: 24px"
        >
          🧹
        </button>
      </div>
      <div id="chat-box"></div>
      <div id="input-area">
        <label style="font-size: 24px"
          >📎<input
            type="file"
            style="display: none"
            onchange="uploadFile(this)"
        /></label>
        <input type="text" id="msgInput" placeholder="Message..." />
        <button
          id="sendBtn"
          class="btn-round"
          style="background: var(--wa-green); color: white"
        >
          ➤
        </button>
      </div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import {
        getDatabase,
        ref,
        push,
        onValue,
        update,
        remove,
        get,
      } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

      const firebaseConfig = {
        apiKey: "AIzaSyAV3pyiwrB0Cf4e4RxLyATu-i9qnWzX1kY",
        databaseURL:
          "https://sibling-help-app-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "sibling-help-app",
      };

      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);
      const users = {
        F10: "Father",
        M20: "Mother",
        A30: "Akash",
        S40: "Aishwarya",
      };
      let myName = "",
        currentRoom = "",
        tempID = "";

      window.onload = () => {
        const savedID = localStorage.getItem("fc_id");
        const savedPin = localStorage.getItem("fc_pin");
        if (savedID && savedPin) {
          tempID = savedID;
          verifyPin(savedPin);
        }
      };

      window.checkID = async () => {
        const id = document.getElementById("idInput").value.toUpperCase();
        if (!users[id]) return alert("Invalid ID");
        tempID = id;
        const snapshot = await get(ref(db, `pins/${id}`));
        document.getElementById("step-id").style.display = "none";
        document.getElementById("step-pin").style.display = "block";
        document.getElementById("pin-title").innerText = snapshot.exists()
          ? "Enter PIN"
          : "Setup PIN";
      };

      window.verifyPin = async (providedPin) => {
        const pin = providedPin || document.getElementById("pinInput").value;
        if (pin.length < 4) return alert("PIN must be 4 digits");
        const snapshot = await get(ref(db, `pins/${tempID}`));
        if (!snapshot.exists() || snapshot.val() === pin) {
          if (!snapshot.exists())
            await update(ref(db, `pins`), { [tempID]: pin });
          localStorage.setItem("fc_id", tempID);
          localStorage.setItem("fc_pin", pin);
          myName = users[tempID];
          document.getElementById("auth-container").style.display = "none";
          document.getElementById("lobby-screen").style.display = "flex";
          renderLobby();
        } else {
          alert("Incorrect PIN!");
        }
      };

      // --- NEW PIN UPDATE LOGIC ---
      window.toggleSettings = (show) => {
        document.getElementById("settings-screen").style.display = show
          ? "flex"
          : "none";
      };

      window.updatePin = async () => {
        const newPin = document.getElementById("newPinInput").value;
        if (newPin.length < 4) return alert("New PIN must be 4 digits");
        const id = localStorage.getItem("fc_id");
        await update(ref(db, `pins`), { [id]: newPin });
        localStorage.setItem("fc_pin", newPin);
        alert("PIN Updated Successfully!");
        toggleSettings(false);
      };

      // --- CORE CHAT LOGIC ---
      function renderLobby() {
        const list = document.getElementById("contact-list");
        list.innerHTML = `<div class="contact-row" onclick="startChat('Family_Group', '🏠 Family Group')">🏠 Family Group</div>`;
        Object.values(users).forEach((u) => {
          if (u !== myName) {
            const row = document.createElement("div");
            row.className = "contact-row";
            row.onclick = () => startChat([myName, u].sort().join("_"), u);
            row.innerText = u;
            list.appendChild(row);
          }
        });
      }

      window.startChat = (room, title) => {
        currentRoom = room;
        document.getElementById("chat-title").innerText = title;
        document.getElementById("lobby-screen").style.display = "none";
        document.getElementById("chat-interface").style.display = "flex";
        onValue(ref(db, `chats/${room}`), (snap) => {
          const box = document.getElementById("chat-box");
          box.innerHTML = "";
          const data = snap.val();
          if (data)
            Object.values(data).forEach((m) => {
              const div = document.createElement("div");
              div.className = `msg ${m.sender === myName ? "me" : "them"}`;
              div.innerHTML = `<small>${m.sender}</small><br>${m.data}`;
              box.appendChild(div);
            });
          box.scrollTop = box.scrollHeight;
        });
      };

      window.handleClear = () => {
        if (confirm("🧹 Clear history?"))
          remove(ref(db, `chats/${currentRoom}`));
      };
      window.backToLobby = () => {
        document.getElementById("chat-interface").style.display = "none";
        document.getElementById("lobby-screen").style.display = "flex";
      };
      window.logout = () => {
        localStorage.clear();
        location.reload();
      };
      document.getElementById("sendBtn").onclick = () => {
        const val = document.getElementById("msgInput").value;
        if (val) {
          push(ref(db, `chats/${currentRoom}`), { sender: myName, data: val });
          document.getElementById("msgInput").value = "";
        }
      };
    </script>
  </body>
</html>
