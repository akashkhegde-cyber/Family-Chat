<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Family Connect Ultra</title>
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#075e54" />
    <style>
      :root {
        --wa-green: #075e54;
        --light-green: #dcf8c6;
        --blue-tick: #34b7f1;
        --bg-gray: #e5ddd5;
      }
      body {
        font-family: "Segoe UI", sans-serif;
        margin: 0;
        background: var(--bg-gray);
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* Status Indicators */
      .status-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        display: inline-block;
        margin-right: 8px;
        border: 1px solid white;
      }
      .online {
        background: #25d366;
        box-shadow: 0 0 5px #25d366;
      }
      .offline {
        background: #bbb;
      }

      /* Screens */
      #login-screen,
      #lobby-screen {
        position: fixed;
        inset: 0;
        background: #f0f2f5;
        z-index: 100;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      .card {
        background: white;
        padding: 25px;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        width: 90%;
        max-width: 380px;
        text-align: center;
      }

      /* Lobby */
      .contact-row {
        background: white;
        border-bottom: 1px solid #eee;
        padding: 18px;
        display: flex;
        align-items: center;
        cursor: pointer;
      }
      .contact-info {
        flex: 1;
        font-weight: 600;
      }
      .badge {
        background: #25d366;
        color: white;
        border-radius: 50%;
        min-width: 20px;
        padding: 2px 6px;
        font-size: 11px;
      }

      /* Chat UI */
      #chat-interface {
        display: none;
        flex-direction: column;
        height: 100vh;
        width: 100%;
        position: absolute;
        top: 0;
        background: var(--bg-gray);
        z-index: 50;
      }
      #chat-header {
        background: var(--wa-green);
        color: white;
        padding: 12px 15px;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      #chat-box {
        flex: 1;
        overflow-y: auto;
        padding: 15px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        background-image: url("https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png");
      }

      /* Message Bubbles */
      .msg {
        padding: 10px;
        border-radius: 12px;
        max-width: 75%;
        font-size: 15px;
        position: relative;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
        cursor: pointer;
      }
      .me {
        align-self: flex-end;
        background: var(--light-green);
        border-top-right-radius: 2px;
      }
      .them {
        align-self: flex-start;
        background: white;
        border-top-left-radius: 2px;
      }

      /* Reactions */
      .reaction-container {
        position: absolute;
        bottom: -12px;
        left: 5px;
        background: white;
        border-radius: 10px;
        padding: 1px 4px;
        font-size: 12px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        display: flex;
        gap: 2px;
      }
      .reaction-picker {
        position: absolute;
        top: -45px;
        left: 0;
        background: white;
        padding: 5px;
        border-radius: 20px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        display: none;
        gap: 8px;
        z-index: 60;
      }
      .reaction-picker span {
        cursor: pointer;
        font-size: 20px;
        transition: transform 0.1s;
      }
      .reaction-picker span:hover {
        transform: scale(1.3);
      }

      /* Input Area */
      #input-area {
        background: #f0f0f0;
        padding: 10px;
        display: flex;
        gap: 8px;
        align-items: center;
      }
      #msgInput {
        flex: 1;
        padding: 12px;
        border-radius: 25px;
        border: 1px solid #ddd;
        outline: none;
      }
      .btn-round {
        width: 45px;
        height: 45px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        border: none;
        font-size: 20px;
        cursor: pointer;
      }
      #micBtn {
        background: white;
        color: #555;
      }
      #micBtn.recording {
        background: #ff4b2b;
        color: white;
        animation: pulse 1s infinite;
      }
      #sendBtn {
        background: var(--wa-green);
        color: white;
      }

      @keyframes pulse {
        0% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
        100% {
          opacity: 1;
        }
      }
      audio {
        height: 35px;
        width: 180px;
      }
    </style>
  </head>
  <body>
    <div id="login-screen">
      <div class="card">
        <h2 style="color: var(--wa-green)">Family Connect</h2>
        <input type="password" id="idInput" placeholder="Enter Secret ID" />
        <button
          onclick="checkLogin()"
          style="
            width: 100%;
            padding: 12px;
            background: var(--wa-green);
            color: white;
            border: none;
            border-radius: 10px;
          "
        >
          Enter
        </button>
      </div>
    </div>

    <div id="lobby-screen" style="display: none">
      <div class="card" style="padding: 0; overflow: hidden; width: 95%">
        <div
          style="
            background: var(--wa-green);
            color: white;
            padding: 15px;
            text-align: left;
          "
        >
          <h3 style="margin: 0">Family Status</h3>
        </div>
        <div id="contact-list"></div>
      </div>
    </div>

    <div id="chat-interface">
      <div id="chat-header">
        <button
          onclick="backToLobby()"
          style="background: none; border: none; color: white; font-size: 24px"
        >
          ←
        </button>
        <span id="chat-title" style="font-weight: bold">Chat</span>
      </div>
      <div id="chat-box"></div>
      <div id="input-area">
        <label style="cursor: pointer; font-size: 22px"
          >📎<input
            type="file"
            accept="image/*"
            style="display: none"
            onchange="uploadFile(this, 'image')"
        /></label>
        <input type="text" id="msgInput" placeholder="Message" />
        <button id="micBtn" class="btn-round" onclick="toggleRecording()">
          🎙️
        </button>
        <button id="sendBtn" class="btn-round" onclick="sendText()">➤</button>
      </div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import {
        getDatabase,
        ref,
        push,
        onValue,
        update,
        remove,
        onDisconnect,
        serverTimestamp,
        query,
        limitToLast,
      } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

      const firebaseConfig = {
        apiKey: "AIzaSyAV3pyiwrB0Cf4e4RxLyATu-i9qnWzX1kY",
        databaseURL:
          "https://sibling-help-app-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "sibling-help-app",
      };

      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);
      const users = {
        F10: "Father",
        M20: "Mother",
        A30: "Akash",
        S40: "Aishwarya",
      };
      let myName = "",
        currentRoom = "",
        mediaRecorder = null,
        audioChunks = [];

      window.checkLogin = () => {
        const id = document.getElementById("idInput").value.toUpperCase();
        if (users[id]) {
          myName = users[id];
          document.getElementById("login-screen").style.display = "none";
          document.getElementById("lobby-screen").style.display = "flex";
          setupStatus();
          renderLobby();
        }
      };

      // --- STATUS SYSTEM ---
      function setupStatus() {
        const myStatusRef = ref(db, `status/${myName}`);
        const connectedRef = ref(db, ".info/connected");
        onValue(connectedRef, (snap) => {
          if (snap.val() === true) {
            onDisconnect(myStatusRef).set("offline");
            update(myStatusRef, {
              state: "online",
              lastSeen: serverTimestamp(),
            });
          }
        });
      }

      function renderLobby() {
        const list = document.getElementById("contact-list");
        list.innerHTML = `<div class="contact-row" onclick="startChat('Family_Group', '🏠 Family Group')">
                <div class="contact-info">🏠 Family Group</div>
            </div>`;

        Object.values(users).forEach((u) => {
          if (u !== myName) {
            const row = document.createElement("div");
            row.className = "contact-row";
            row.onclick = () => startChat([myName, u].sort().join("_"), u);
            row.innerHTML = `<span id="dot-${u}" class="status-dot offline"></span>
                                    <div class="contact-info">${u}</div>
                                    <span id="badge-${u}" class="badge" style="display:none">0</span>`;
            list.appendChild(row);

            onValue(ref(db, `status/${u}`), (s) => {
              const dot = document.getElementById(`dot-${u}`);
              if (s.val()?.state === "online")
                dot.className = "status-dot online";
              else dot.className = "status-dot offline";
            });
          }
        });
      }

      // --- VOICE MESSAGES ---
      window.toggleRecording = async () => {
        const btn = document.getElementById("micBtn");
        if (!mediaRecorder || mediaRecorder.state === "inactive") {
          const stream = await navigator.mediaDevices.getUserMedia({
            audio: true,
          });
          mediaRecorder = new MediaRecorder(stream);
          audioChunks = [];
          mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
          mediaRecorder.onstop = () => {
            const blob = new Blob(audioChunks, { type: "audio/webm" });
            const reader = new FileReader();
            reader.onloadend = () =>
              saveMsg({ type: "voice", data: reader.result });
            reader.readAsDataURL(blob);
          };
          mediaRecorder.start();
          btn.classList.add("recording");
        } else {
          mediaRecorder.stop();
          btn.classList.remove("recording");
        }
      };

      // --- CORE CHAT ---
      window.startChat = (room, title) => {
        currentRoom = room;
        document.getElementById("chat-title").innerText = title;
        document.getElementById("lobby-screen").style.display = "none";
        document.getElementById("chat-interface").style.display = "flex";
        listenMessages();
      };

      window.sendText = () => {
        const t = document.getElementById("msgInput").value.trim();
        if (t) {
          saveMsg({ type: "text", data: t });
          document.getElementById("msgInput").value = "";
        }
      };

      window.uploadFile = (input, type) => {
        const reader = new FileReader();
        reader.onload = (e) => saveMsg({ type: type, data: e.target.result });
        reader.readAsDataURL(input.files[0]);
      };

      function saveMsg(m) {
        push(ref(db, `chats/${currentRoom}`), {
          ...m,
          sender: myName,
          time: new Date().toLocaleTimeString([], {
            hour: "2-digit",
            minute: "2-digit",
          }),
          timestamp: Date.now(),
          seen: false,
        });
      }

      function listenMessages() {
        const box = document.getElementById("chat-box");
        onValue(
          query(ref(db, `chats/${currentRoom}`), limitToLast(30)),
          (snap) => {
            box.innerHTML = "";
            const data = snap.val();
            if (data)
              Object.keys(data).forEach((id) => {
                const m = data[id];
                const div = document.createElement("div");
                div.className = `msg ${m.sender === myName ? "me" : "them"}`;

                // Add Reactions to UI
                let reactionHtml = m.reactions
                  ? `<div class="reaction-container">${Object.values(m.reactions).join("")}</div>`
                  : "";

                let content =
                  m.type === "text"
                    ? m.data
                    : m.type === "image"
                      ? `<img src="${m.data}" style="max-width:100%; border-radius:8px">`
                      : `<audio controls src="${m.data}"></audio>`;

                div.innerHTML = `<b style="font-size:10px">${m.sender}</b><br>${content}${reactionHtml}
                                     <div class="reaction-picker">
                                        <span onclick="react('${id}','❤️')">❤️</span><span onclick="react('${id}','😂')">😂</span><span onclick="react('${id}','👍')">👍</span>
                                     </div>`;

                div.onclick = () => {
                  const picker = div.querySelector(".reaction-picker");
                  picker.style.display =
                    picker.style.display === "flex" ? "none" : "flex";
                };

                box.appendChild(div);
              });
            box.scrollTop = box.scrollHeight;
          },
        );
      }

      window.react = (msgId, emoji) => {
        update(ref(db, `chats/${currentRoom}/${msgId}/reactions`), {
          [myName]: emoji,
        });
      };

      window.backToLobby = () => {
        document.getElementById("chat-interface").style.display = "none";
        document.getElementById("lobby-screen").style.display = "flex";
      };
    </script>
  </body>
</html>
